<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-top: #f0fbf7;
            --bg-bottom: #fff0df;
            --primary: #0f6d53;
            --primary-strong: #095c44;
            --text-main: #1e2a2a;
            --text-soft: #5a6667;
            --danger-text: #8d1f17;
            --danger-bg: #ffe8e5;
            --card-bg: rgba(255, 255, 255, 0.88);
            --card-border: rgba(255, 255, 255, 0.72);
            --shadow: 0 18px 50px rgba(23, 43, 42, 0.16);
        }
        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            z-index: 0;
        }
        body::before {
            width: 320px;
            height: 320px;
            background: radial-gradient(circle at center, rgba(15, 109, 83, 0.2), rgba(15, 109, 83, 0));
            top: -110px;
            left: -60px;
        }
        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle at center, rgba(242, 120, 33, 0.16), rgba(242, 120, 33, 0));
            right: -110px;
            bottom: -130px;
        }
        .register-container {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 32px 30px;
            border-radius: 22px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            animation: floatIn 0.7s ease;
        }
        .register-container h2 {
            text-align: center;
            color: var(--text-main);
            margin: 0 0 8px;
            font-size: 29px;
            font-weight: 800;
            letter-spacing: -0.6px;
        }
        .subtitle {
            margin: 0 0 24px;
            text-align: center;
            color: var(--text-soft);
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-soft);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #d0dbdc;
            border-radius: 11px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
            background-color: #ffffff;
        }
        .form-group input:focus {
            outline: none;
            border-color: #57a992;
            box-shadow: 0 0 0 4px rgba(87, 169, 146, 0.2);
            transform: translateY(-1px);
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, var(--primary), #178065);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            margin-top: 10px;
            transition: transform 0.25s, box-shadow 0.25s, background 0.25s;
        }
        .btn-submit:hover {
            background: linear-gradient(90deg, var(--primary-strong), var(--primary));
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(15, 109, 83, 0.24);
        }
        .error-message {
            color: var(--danger-text);
            background-color: var(--danger-bg);
            padding: 11px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }
        .back-link {
            margin-top: 16px;
            text-align: center;
            color: var(--text-soft);
            font-size: 14px;
        }
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @media (max-width: 480px) {
            .register-container {
                padding: 26px 20px;
                border-radius: 18px;
            }
            .register-container h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Registro de Usuario</h2>
        <p class="subtitle">Crea tu cuenta para acceder al sistema</p>

        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" name="username" value="{{ form_data.username }}" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" value="{{ form_data.email }}" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirmar contraseña</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn-submit">Registrarme</button>
        </form>

        <div class="back-link">
            ¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Volver a iniciar sesión</a>
        </div>
    </div>
</body>
</html>
