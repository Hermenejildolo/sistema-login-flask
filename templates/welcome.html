<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
            text-align: center;
            padding-top: 50px;
        }
        .welcome-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .logo-institucional {
            max-width: 250px;
            height: auto;
            margin-bottom: 20px;
        }
        h1 {
            color: #0056b3;
        }
        .btn-logout {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #dc3545;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .btn-logout:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                {% if category == 'success' %}
                    <script>
                        
                        window.onload = function() {
                            alert("{{ message }}");
                        };
                    </script>
                {% endif %}
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="welcome-container">
        <img src="{{ url_for('static', filename='Imagen1.png') }}" alt="Logo Institucional FET" class="logo-institucional">
        
        <h1>¡Bienvenido al Sistema!</h1>
        <p>Ha iniciado sesión correctamente en la plataforma.</p>

        <a href="{{ url_for('logout') }}" class="btn-logout">Cerrar Sesión</a>
    </div>

</body>
</html>
